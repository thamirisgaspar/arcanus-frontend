    </div>
  
    <h1>Welcome to Arcanum ⛧ Oculltus</h1>

    <ul class="nav nav-pills nav-fill" id="pills-tab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link {{login}}" name="login" id="pills-login-tab" data-bs-toggle="pill"
            data-bs-target="#pills-login" type="button" role="tab" aria-controls="pills-login"
            aria-selected="true" (click)="trocaRota($event)">Login</button>
        </li>
  
        <li class="nav-item" role="presentation">
            <button class="nav-link {{signup}}" name="signup" id="pills-signup-tab" data-bs-toggle="pill"

            aria-selected="true" (click)="trocaRota($event)">Sign up</button>
        </li>
    </ul>
  
    <div class="tab-content" id="pills-tabContent">
        <div class="tab-pane fade {{loginTab}}" id="pills-login" role="tabpanel" aria-labelledby="pills-login-tab" tabindex="0">
            <app-login></app-login>
        </div>
  
        <div class="tab-pane fade {{signupTab}}" id="pills-signup" role="tabpanel" aria-labelledby="pills-signup-tab" tabindex="0">

    </div>
